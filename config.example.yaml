  brands: brands.yaml
  weekly_xlsx: "2026年Youro运营数据周分析表（6.22—6.28）.xlsx"
  a02: A02-财务收支.xlsx
  a05: A05-销售管理表.xlsx
  salesperson_globs:
    - "A-0601-*数据汇总表.xlsx"
